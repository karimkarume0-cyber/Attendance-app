<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendly - Digital Attendance Workspace</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #cbd5e1;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      padding: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    p.subtitle {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 1rem;
      color: var(--text-main);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .row {
        grid-template-columns: 1fr;
      }
    }

    .session-header {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      padding: 1.25rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
    }

    .session-header h2 {
      font-size: 1.25rem;
      color: #1e40af;
      margin-bottom: 0.75rem;
    }

    .session-meta {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #1e3a8a;
    }

    .signature-pad-container {
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: #fff;
      position: relative;
      margin-bottom: 0.5rem;
    }

    canvas {
      display: block;
      width: 100%;
      height: 180px;
      touch-action: none;
      cursor: crosshair;
    }

    .signature-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button.secondary {
      background-color: #e2e8f0;
      color: var(--text-main);
    }

    button.secondary:hover {
      background-color: #cbd5e1;
    }

    .btn-full {
      width: 100%;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 id="pageTitle">Attendly Workspace</h1>
    <p class="subtitle" id="pageSubtitle">Configure your attendance session or fill out details below.</p>

    <!-- Session Setup / Admin View -->
    <div id="session">
      <div class="form-group">
        <label for="inputTitle">Session Title</label>
        <input type="text" id="inputTitle" placeholder="e.g., Leadership & Management Masterclass">
      </div>
      <div class="row">
        <div class="form-group">
          <label for="inputFacilitator">Facilitator / Instructor</label>
          <input type="text" id="inputFacilitator" placeholder="e.g., Karim Karume">
        </div>
        <div class="form-group">
          <label for="inputLocation">Location / Venue</label>
          <input type="text" id="inputLocation" placeholder="e.g., Kampala Boardroom A">
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label for="date">Session Date</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="day">Day of Week</label>
          <input type="text" id="day" readonly>
        </div>
      </div>
      <button class="btn-full" id="generateLinkBtn" style="margin-top: 1rem;">Generate Participant Check-In Link</button>
      <div id="linkOutput" class="form-group" style="margin-top: 1rem;" hidden>
        <label for="shareableLink">Shareable Participant Link</label>
        <input type="text" id="shareableLink" readonly>
      </div>
    </div>

    <!-- Participant Mode Header View -->
    <div id="sessionHeader" class="session-header" hidden>
      <h2 id="sessionHeaderTitle">Attendance Session</h2>
      <ul class="session-meta">
        <li id="sessionLocationItem" hidden><strong>Location:</strong> <span id="sessionLocation"></span></li>
        <li id="sessionFacilitatorItem" hidden><strong>Facilitator:</strong> <span id="sessionFacilitator"></span></li>
        <li id="sessionDateItem" hidden><strong>Date:</strong> <span id="sessionDate"></span></li>
        <li id="sessionDayItem" hidden><strong>Day:</strong> <span id="sessionDay"></span></li>
      </ul>
    </div>

    <!-- Check-In Form Fields -->
    <div id="checkInForm" style="margin-top: 1.5rem;">
      <div class="row">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="text" id="email" placeholder="name@example.com">
        </div>
      </div>

      <div class="form-group">
        <label>Signature</label>
        <div class="signature-pad-container">
          <canvas id="signatureCanvas"></canvas>
        </div>
        <div class="signature-actions">
          <button type="button" class="secondary" id="clearSignature">Clear Signature</button>
          <span style="font-size: 0.8rem; color: var(--text-muted);">Sign inside the box above</span>
        </div>
      </div>

      <button class="btn-full" id="submitAttendance">Submit Attendance</button>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function isValidIsoDate(value) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
      const [year, month, day] = value.split("-").map(Number);
      const dateObj = new Date(Date.UTC(year, month - 1, day));
      return (
        dateObj.getUTCFullYear() === year &&
        dateObj.getUTCMonth() === month - 1 &&
        dateObj.getUTCDate() === day
      );
    }

    function getDayName(dateString) {
      if (!isValidIsoDate(dateString)) return "";
      const [year, month, day] = dateString.split("-").map(Number);
      const dateObj = new Date(Date.UTC(year, month - 1, day));
      return new Intl.DateTimeFormat('en-US', { weekday: 'long', timeZone: 'UTC' }).format(dateObj);
    }

    // Parse URL parameters for participant view mode
    const urlParams = new URLSearchParams(window.location.search);
    const urlMetadata = {
      title: urlParams.get('title'),
      location: urlParams.get('location'),
      facilitator: urlParams.get('facilitator'),
      date: urlParams.get('date'),
      day: urlParams.get('day')
    };

    const isParticipantMode = Boolean(urlMetadata.title || urlMetadata.date);

    // Canvas Signature Setup
    const canvas = $('signatureCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    canvas.addEventListener('mousedown', (e) => { isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); });
    canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); });
    window.addEventListener('mouseup', () => { isDrawing = false; });

    canvas.addEventListener('touchstart', (e) => { isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { if (!isDrawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); });
    window.addEventListener('touchend', () => { isDrawing = false; });

    $('clearSignature').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // Initialize application state on load
    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date().toISOString().split('T')[0];
      $('date').value = today;
      $('day').value = getDayName(today);

      $('date').addEventListener('change', (e) => {
        $('day').value = getDayName(e.target.value);
      });

      if (isParticipantMode) {
        document.body.classList.add('participant-mode');
        $('pageTitle').textContent = urlMetadata.title || 'Attendance Session';
        $('pageSubtitle').textContent = 'Please complete your details and sign below to record your attendance.';
        $('session').hidden = true;
        $('sessionHeader').hidden = false;
        $('sessionHeaderTitle').textContent = urlMetadata.title || 'Attendance Session';
        
        if (urlMetadata.location) {
          $('sessionLocationItem').hidden = false;
          $('sessionLocation').textContent = urlMetadata.location;
        }
        if (urlMetadata.facilitator) {
          $('sessionFacilitatorItem').hidden = false;
          $('sessionFacilitator').textContent = urlMetadata.facilitator;
        }
        if (urlMetadata.date) {
          $('sessionDateItem').hidden = false;
          $('sessionDate').textContent = urlMetadata.date;
        }
        if (urlMetadata.day) {
          $('sessionDayItem').hidden = false;
          $('sessionDay').textContent = urlMetadata.day;
        }
      }
    });

    // Generate Shareable Link
    $('generateLinkBtn').addEventListener('click', () => {
      const title = encodeURIComponent($('inputTitle').value || 'General Session');
      const facilitator = encodeURIComponent($('inputFacilitator').value || '');
      const location = encodeURIComponent($('inputLocation').value || '');
      const date = encodeURIComponent($('date').value);
      const day = encodeURIComponent($('day').value);

      const baseUrl = window.location.href.split('?')[0];
      const generatedUrl = `${baseUrl}?title=${title}&facilitator=${facilitator}&location=${location}&date=${date}&day=${day}`;
      
      $('shareableLink').value = generatedUrl;
      $('linkOutput').hidden = false;
      $('shareableLink').select();
    });

    // Handle Submission
    $('submitAttendance').addEventListener('click', () => {
      const fullName = $('fullName').value.trim();
      const email = $('email').value.trim();

      if (!fullName || !email) {
        alert('Please fill in both your full name and email address.');
        return;
      }

      const signatureData = canvas.toDataURL();
      
      // Store locally or handle export payload logic
      const record = {
        title: isParticipantMode ? urlMetadata.title : $('inputTitle').value,
        date: isParticipantMode ? urlMetadata.date : $('date').value,
        fullName,
        email,
        signatureData,
        timestamp: new Date().toISOString()
      };

      let existingRecords = JSON.parse(localStorage.getItem('attendly_records') || '[]');
      existingRecords.push(record);
      localStorage.setItem('attendly_records', JSON.stringify(existingRecords));

      alert('Attendance successfully recorded!');
      $('fullName').value = '';
      $('email').value = '';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
  </script>
</body>
</html>
